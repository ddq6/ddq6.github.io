<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网上书城注册</title>
    <style>
        .container {
            width: 580px;
            margin: 0 auto;
        }
        .book-title {
            background-color: #720270bb;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            font-size: 22px;
            letter-spacing: 6px;
            width: 576px;
            box-sizing: border-box;
            margin: 0 auto;
        }
        .form-wrap {
            border: 8px solid #f1dbf8;  
            background: #d66ce99f;        
            width: 576px;               
            margin: 5px auto 0;       
            padding: 8px;               
            box-sizing: border-box;     
        }
        .form-head {
            background: linear-gradient(to bottom, #ffffff, #ee15d1);
            padding: 8px 10px;
            font-size: 16px;
            margin: 0;
            color: #121312;
            display: flex;
            align-items: center;
        }
        .plus-img {
            width: 18px;
            height: 18px;
            margin-right: 6px;
        }
        form {
            width: 320px;
            margin: 0 auto;
            margin-top: 18px;
        }
        .input-row {
            margin: 14px 0;
        }
        .input-box  {
            display: flex;
            align-items: center;
            border: 1px solid #9a9898;
            height: 24px;
            padding: 0 6px;
            background: #ffffff;
        }
        .input-box img {
            width: 16px;
            height: 16px;
            margin-right: 5px;
        }
        .input-box input {
            flex: 1;
            border: none;
            outline: none;
            height: 22px;
    
        }        
        .input-box:has(input:focus){
            border: 2px solid #9a9898;
            background: #cccccc;
        }
        .submit-box {
            text-align: center;
            margin-top: 18px;
        }
        .submit-box input {
            width: 100%;
            height: 28px;
            background: #78038a;
            color: #fff;
            border: none;
        }
        .submit-box input:focus {
            background: #65026e;
        }
        .form-head img {
            width: 14px;   
            height: auto;  
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="book-title">网 上 书 城</div>
        <div class="form-wrap">
            <div class="form-head">
                <img src="images\加.svg" alt="加号">
             注册新用户   
            </div>
            <form>
                <div class="input-row">
                    <div class="input-box">
                        <img src="images\用户.svg" alt="用户名">
                        <input type="text" placeholder="用户名">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-box">
                        <img src="images\钥匙.svg" alt="密码">
                        <input type="password" placeholder="密码">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-box">
                        <img src="images\钥匙.svg" alt="密码">
                        <input type="password" placeholder="确认密码">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-box">
                        <img src="images\信封 (1).svg" alt="邮箱">
                        <input type="email" placeholder="电子邮箱">
                    </div>
                </div>
                <div class="submit-box">
                    <input type="submit" value="注册新用户">
                </div>
            </form>
        </div>
    </div>
</body>
</html>
