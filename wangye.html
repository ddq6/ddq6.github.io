 <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAE Work 网页版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none;
            text-decoration: none;
        }

        html {
            background-image: url("xiaoxin.jpg");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        html, body {
            min-height: 100vh;
            overflow-x: hidden;
            overscroll-behavior: none;
            background-color: transparent;
        }
        body {
            background-color: rgba(0, 0, 0, 0.35);
            position: relative;
        }


        .drop-water {
            position: absolute;
            width: 6px;
            height: 12px;
            background: rgba(200, 240, 255, 0.65);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            pointer-events: none;
            z-index: 10;
        }

        .daohanglan {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            padding: 14px 50px;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
            border-bottom: 1px solid #1a1a1a;
        }
        .daohang-logo {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }
        .daohang-logo a {
            color: #fff;
        }
        .caidan-liebiao {
            display: flex;
            gap: 36px;
        }
        .caidan-xiang {
            color: #ccc;
            font-size: 14px;
            position: relative;
        }
        .caidan-xiang a {
            color: inherit;
        }
        .caidan-xiang:hover {
            color: #fff;
        }
        .xiala-caidan {
            position: absolute;
            top: 28px;
            left: 0;
            width: 140px;
            background: #111;
            padding: 10px 16px;
            display: none;
        }
        .caidan-xiang:hover .xiala-caidan {
            display: block;
        }
        .xiala-xiang {
            padding: 7px 0;
            color: #ccc;
        }
        .xiala-xiang:hover {
            color: #40e080;
        }
        .anniu-quyu {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .denglu-wenzi {
            color: #ccc;
        }
        .xiazai-anniu {
            background: #22bb66;
            color: #000;
            padding: 7px 16px;
            border-radius: 3px;
            font-weight: 500;
        }
        .xiazai-anniu:hover {
            background-color: #189952;
        }

        .zhuye-rongqi {
            margin-top: 70px;
            min-height: 100vh;
            background: transparent;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 45px;
        }

        .wenzi-qu2 {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 75%;
            text-align: center;
        }
        
        .jianbian-xiaobiao {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(90deg, #40e080, #8affb8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .dabiaoti-zhuti {
            font-size: 52px;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .shuru-qu3 {
            width: 75%;
            height: 180px;
            border: 1px solid #333;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 30px;
            background-color: rgba(0,0,0,0.3);
        }

        .shuru-kuang {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            resize: none;
            outline: none;
        }
        .shuru-kuang::placeholder {
            color: #777;
        }

        .gongneng-anniu-qu4 {
            width: 75%;
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        .gongneng-anniu {
            padding: 9px 18px;
            background: rgba(34, 34, 34, 0.75);
            color: #fff;
            border-radius: 3px;
        }
        .gongneng-anniu:hover {
            background-color: #2a2a2a;
        }

        .kapian-qu5 {
            width: 75%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .xiaokapian {
            background: rgba(18, 18, 18, 0.8);
            border: 1px solid #222;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 3px;
            color: #b0b0b0;
            font-size: 14px;
        }

        .kapian-tubiao {
            width: 32px;
            height: 32px;
            background: #1a1a1a;
            border-radius: 3px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .kapian-tubiao img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dibu-jianbian-qu6 {
            width: 75%;
            height: 80px;
            background: linear-gradient(to top, rgba(15, 68, 38, 0.6), transparent);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="daohanglan">
        <div class="daohang-logo">
            <a href=" ">TRAE</a >
        </div>
        <ul class="caidan-liebiao">
            <li class="caidan-xiang">企业版</li>
            <li class="caidan-xiang"><a href="./dingjiaye.html">定价</a ></li>
            <li class="caidan-xiang">文档</li>
            <li class="caidan-xiang"><a href="./gengxinriz.html">更新日志</a ></li>
            <li class="caidan-xiang">社区</li>
            <li class="caidan-xiang">创造力大赛</li>
            <li class="caidan-xiang">
                产品
                <div class="xiala-caidan">
                    <div class="xiala-xiang">TRAE Work</div>
                    <div class="xiala-xiang">TRAE IDE</div>
                    <div class="xiala-xiang">TRAE 插件</div>
                </div>
            </li>
        </ul>
        <div class="anniu-quyu">
            <a href="#" class="denglu-wenzi">登录</a >
            <a href="#" class="xiazai-anniu">下载中心</a >
        </div>
    </div>

    <div class="zhuye-rongqi">

        <div class="wenzi-qu2">
            <div class="jianbian-xiaobiao">全新TRAE Work</div>
            <div class="dabiaoti-zhuti">不止于码 大有可为</div>
        </div>

        <div class="shuru-qu3">
            <textarea class="shuru-kuang" placeholder="描述你想做的事，接下来交给 TRAE Work"></textarea>
        </div>

        
        <div class="gongneng-anniu-qu4">
            <a href="#" class="gongneng-anniu">梳理用户反馈</a >
            <a href="#" class="gongneng-anniu">整理调研报告</a >
            <a href="#" class="gongneng-anniu">生成PPT</a >
            <a href="#" class="gongneng-anniu">搭建数据看板</a >
        </div>

        <div class="kapian-qu5">
            
            <div class="xiaokapian">
                <div class="kapian-tubiao">
                    <img src="论文题目.png" alt="论文图表">
                </div>
                <span>科研论文，产出论证图表</span>
            </div>
            
            <div class="xiaokapian">
                <div class="kapian-tubiao">
                    <img src="PPT.png" alt="PPT汇报">
                </div>
                <span>调研各个视频平台，生成汇报PPT</span>
            </div>
            
            <div class="xiaokapian">
                <div class="kapian-tubiao">
                    <img src="数据趋势.png" alt="市场数据">
                </div>
                <span>挖掘市场数据，分析数据趋势</span>
            </div>
            
            <div class="xiaokapian">
                <div class="kapian-tubiao">
                    <img src="网站.png" alt="网站开发">
                </div>
                <span>开发一个多语言学习网站</span>
            </div>
           
            <div class="xiaokapian">
                <div class="kapian-tubiao">
                    <img src="项目.png" alt="项目仓库">
                </div>
                <span>分析这个项目仓库，生成code wiki</span>
            </div>
            
            <div class="xiaokapian">
                <div class="kapian-tubiao">
                    <img src="游戏.png" alt="像素游戏">
                </div>
                <span>创作一个像素风即时对战游戏</span>
            </div>
        </div>

        <div class="dibu-jianbian-qu6"></div>
    </div>

  
    <script>
        let mouseDown = false;
        let holdTimer = null;

        
        function createDrop(x, y) {
            const drop = document.createElement('div');
            drop.className = 'drop-water';
            drop.style.left = x + 'px';
            drop.style.top = y + 'px';
            document.body.appendChild(drop);

            let offsetX = (Math.random() - 0.5) * 30;
            let offsetY = 0;
            let opacity = 0.7;
            const speedY = Math.random() * 2 + 1;
            const speedX = (Math.random() - 0.5) * 0.8;

            function animate() {
                offsetY += speedY;
                offsetX += speedX;
                opacity -= 0.015;
                drop.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
                drop.style.opacity = opacity;

                if (opacity > 0) {
                    requestAnimationFrame(animate);
                } else {
                    drop.remove();
                }
            }
            animate();
        }

        
        function holdSpawn(x, y) {
            createDrop(x, y);
            holdTimer = setTimeout(() => {
                if (mouseDown) holdSpawn(x, y);
            }, 40);
        }

       
        document.addEventListener('mousedown', (e) => {
            mouseDown = true;
            for (let i = 0; i < 8; i++) createDrop(e.clientX, e.clientY);
            holdSpawn(e.clientX, e.clientY);
        });

        
        document.addEventListener('mouseup', () => {
            mouseDown = false;
            clearTimeout(holdTimer);
        });

        
        document.addEventListener('mousemove', (e) => {
            createDrop(e.clientX, e.clientY);
        });

        
        document.addEventListener('mouseleave', () => {
            mouseDown = false;
            clearTimeout(holdTimer);
        });
    </script>
</body>
</html>
